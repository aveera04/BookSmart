<!-- just a basic contact form template for the contact page. It extends the base template and includes a form for users to submit their name, email, and message. The form uses POST method and includes CSRF token for security. The styling is included within the template for simplicity. -->

{% extends 'base.html' %}

{% block content %}
<section class="contact-section">
    <div class="contact-card">
        <h1>Contact Us</h1>
        <p>Have a question or feedback? Send us a message and our team will respond soon.</p>

        <form method="post" class="contact-form">
            {% csrf_token %}
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" placeholder="Your full name" required>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" required>
            </div>

            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" name="message" rows="6" placeholder="Type your message" required></textarea>
            </div>

            <button type="submit" class="btn-submit">Send Message</button>
        </form>
    </div>
</section>

<link rel="stylesheet" href="/static/css/contact.css">
{% endblock %}
