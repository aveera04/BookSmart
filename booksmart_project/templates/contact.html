<!-- just a basic contact form template for the contact page. It extends the base template and includes a form for users to submit their name, email, and message. The form uses POST method and includes CSRF token for security. The styling is included within the template for simplicity. -->

{% extends 'base.html' %}

{% block content %}
<section class="contact-section">
    <div class="contact-card">
        <h1>Contact Us</h1>
        <p>Have a question or feedback? Send us a message and our team will respond soon.</p>

        <form method="post" class="contact-form">
            {% csrf_token %}
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" placeholder="Your full name" required>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" required>
            </div>

            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" name="message" rows="6" placeholder="Type your message" required></textarea>
            </div>

            <button type="submit" class="btn-submit">Send Message</button>
        </form>
    </div>
</section>

<style>
    .contact-section {
        background: #dce8f5;
        min-height: 65vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px 20px;
    }

    .contact-card {
        width: 100%;
        max-width: 720px;
        background: #ffffff;
        border-radius: 14px;
        box-shadow: 0 8px 26px rgba(0, 0, 0, 0.1);
        padding: 30px;
    }

    .contact-card h1 {
        color: #1e3a5f;
        margin-bottom: 8px;
    }

    .contact-card p {
        color: #4b5563;
        margin-bottom: 20px;
    }

    .form-group {
        margin-bottom: 15px;
    }

    .form-group label {
        display: block;
        margin-bottom: 6px;
        font-weight: 600;
        color: #1f2937;
    }

    .form-group input,
    .form-group textarea {
        width: 100%;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        padding: 10px 12px;
        font-size: 14px;
        font-family: inherit;
    }

    .form-group textarea {
        resize: vertical;
    }

    .btn-submit {
        background: #1e3a5f;
        color: #ffffff;
        border: none;
        border-radius: 8px;
        padding: 11px 18px;
        font-weight: 600;
        cursor: pointer;
    }

    .btn-submit:hover {
        background: #2c5f7c;
    }
</style>
{% endblock %}
